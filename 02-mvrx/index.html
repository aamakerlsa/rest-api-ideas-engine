<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVRX - Member Voting Record Explorer</title>
<style>
:root {
  --navy: #1b2a4a;
  --navy-light: #243657;
  --navy-dark: #111d33;
  --gold: #c9a94e;
  --gold-light: #dfc06a;
  --gold-dark: #a8893c;
  --bg: #0f1923;
  --card-bg: #1a2740;
  --card-hover: #213050;
  --text: #e8e8e8;
  --text-muted: #8a9bb5;
  --text-dim: #5a6a80;
  --success: #4caf50;
  --danger: #e74c3c;
  --warning: #f39c12;
  --info: #3498db;
  --border: #2a3a55;
  --radius: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
a { color: var(--gold); text-decoration: none; }
a:hover { color: var(--gold-light); }

/* Header */
.header {
  background: linear-gradient(135deg, var(--navy-dark), var(--navy));
  border-bottom: 3px solid var(--gold);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.back-link {
  font-size: 14px; color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
  transition: color .2s;
}
.back-link:hover { color: var(--gold); }
.header-brand {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.header-brand h1 {
  font-size: 22px; font-weight: 700; letter-spacing: 3px;
  color: var(--gold);
}
.header-brand .tagline {
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 1px; text-transform: uppercase;
}
.header-nav { display: flex; gap: 8px; }
.header-nav button {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-muted); padding: 6px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: all .2s;
}
.header-nav button:hover, .header-nav button.active {
  background: var(--gold); color: var(--navy-dark); border-color: var(--gold);
}

/* Main Layout */
.app-container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Session Selector */
.session-bar {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.session-bar label { color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.session-bar select {
  background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer;
}
.session-bar select:focus { border-color: var(--gold); outline: none; }

/* Search / Filter Bar */
.filter-bar {
  display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
}
.filter-bar input, .filter-bar select {
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text); padding: 10px 16px; border-radius: 8px;
  font-size: 14px; transition: border-color .2s;
}
.filter-bar input { flex: 1; min-width: 200px; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--gold); outline: none; }
.filter-bar select { min-width: 140px; cursor: pointer; }

/* Member Grid */
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.member-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  cursor: pointer; transition: all .25s ease;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  position: relative; overflow: hidden;
}
.member-card:hover {
  transform: translateY(-4px); border-color: var(--gold);
  box-shadow: 0 8px 30px rgba(201,169,78,0.15);
}
.member-card .party-stripe {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.party-r { background: #e74c3c; }
.party-d { background: #3498db; }
.party-i { background: #9b59b6; }
.member-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--navy-light); border: 3px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: var(--gold);
  margin-bottom: 12px; margin-top: 8px;
}
.member-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.member-card .member-meta { font-size: 12px; color: var(--text-muted); }
.member-card .member-meta span { margin: 0 4px; }
.member-card .party-badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 700; margin-top: 8px;
  text-transform: uppercase; letter-spacing: 1px;
}
.badge-r { background: rgba(231,76,60,0.2); color: #e74c3c; }
.badge-d { background: rgba(52,152,219,0.2); color: #3498db; }
.badge-i { background: rgba(155,89,182,0.2); color: #9b59b6; }

/* Compare Selection */
.compare-hint {
  background: var(--navy-light); border: 1px dashed var(--gold);
  border-radius: 8px; padding: 12px 20px; margin-bottom: 16px;
  text-align: center; color: var(--gold); font-size: 14px;
  display: none;
}
.compare-hint.active { display: block; }
.member-card.selected-compare { border: 2px solid var(--gold); background: var(--card-hover); }

/* Profile View */
.profile-view { display: none; }
.profile-view.active { display: block; }
.profile-header {
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  border-radius: var(--radius); padding: 32px;
  display: flex; gap: 32px; align-items: flex-start;
  margin-bottom: 24px; border: 1px solid var(--border);
  flex-wrap: wrap;
}
.profile-avatar {
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--navy-dark); border: 4px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; font-weight: 700; color: var(--gold);
  flex-shrink: 0;
}
.profile-info { flex: 1; min-width: 250px; }
.profile-info h2 { font-size: 28px; margin-bottom: 4px; }
.profile-info .profile-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 16px; }
.profile-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.profile-detail-item label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.profile-detail-item span { font-size: 14px; color: var(--text); }
.profile-bio {
  background: var(--card-bg); border-radius: 8px; padding: 16px;
  margin-top: 16px; font-size: 14px; color: var(--text-muted);
  line-height: 1.7; max-width: 100%;
}

/* Stats Cards Row */
.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; text-align: center;
}
.stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--gold); }
.stat-card .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

/* Tabs */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 24px;
  border-bottom: 2px solid var(--border); padding-bottom: 0;
}
.tab-btn {
  background: transparent; border: none; color: var(--text-muted);
  padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Pie Chart (CSS) */
.pie-chart-container {
  display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
  justify-content: center; margin: 24px 0;
}
.css-pie {
  width: 180px; height: 180px; border-radius: 50%;
  position: relative;
}
.pie-legend { display: flex; flex-direction: column; gap: 10px; }
.pie-legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.pie-legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.pie-legend-value { color: var(--text-muted); font-size: 13px; }

/* Bar Charts */
.bar-chart { margin: 16px 0; }
.bar-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.bar-label { width: 140px; font-size: 13px; color: var(--text-muted); text-align: right; flex-shrink: 0; }
.bar-track {
  flex: 1; height: 28px; background: var(--navy-dark);
  border-radius: 14px; overflow: hidden; position: relative;
}
.bar-fill {
  height: 100%; border-radius: 14px; transition: width .8s ease;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px; font-size: 12px; font-weight: 600; min-width: 40px;
}

/* Heatmap */
.heatmap-container { overflow-x: auto; margin: 16px 0; }
.heatmap-grid {
  display: grid; gap: 3px;
  grid-template-rows: repeat(7, 16px);
  grid-auto-flow: column;
  width: fit-content;
}
.heatmap-cell {
  width: 16px; height: 16px; border-radius: 3px;
  background: var(--navy-dark);
  transition: background .2s;
}
.heatmap-cell[title] { cursor: pointer; }
.heatmap-cell.level-1 { background: rgba(201,169,78,0.2); }
.heatmap-cell.level-2 { background: rgba(201,169,78,0.4); }
.heatmap-cell.level-3 { background: rgba(201,169,78,0.6); }
.heatmap-cell.level-4 { background: rgba(201,169,78,0.85); }
.heatmap-legend {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px; font-size: 12px; color: var(--text-muted);
}
.heatmap-legend .heatmap-cell { cursor: default; }
.heatmap-months {
  display: flex; gap: 0; margin-bottom: 4px; font-size: 11px; color: var(--text-dim);
}
.heatmap-months span { min-width: 57px; }

/* Vote History List */
.vote-list { margin-top: 16px; }
.vote-item {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 10px;
  display: flex; gap: 16px; align-items: flex-start;
  transition: border-color .2s;
}
.vote-item:hover { border-color: var(--gold-dark); }
.vote-result {
  width: 48px; height: 48px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  flex-shrink: 0; letter-spacing: 1px;
}
.vote-yea { background: rgba(76,175,80,0.15); color: var(--success); }
.vote-nay { background: rgba(231,76,60,0.15); color: var(--danger); }
.vote-absent { background: rgba(138,155,181,0.15); color: var(--text-muted); }
.vote-excused { background: rgba(243,156,18,0.15); color: var(--warning); }
.vote-details { flex: 1; }
.vote-details h4 { font-size: 14px; margin-bottom: 4px; }
.vote-details .vote-motion { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
.vote-details .vote-time { font-size: 12px; color: var(--text-dim); }
.vote-details .vote-approved { font-size: 12px; font-weight: 600; }
.vote-approved.yes { color: var(--success); }
.vote-approved.no { color: var(--danger); }

/* Pagination */
.pagination {
  display: flex; justify-content: center; gap: 8px; margin-top: 20px;
}
.pagination button {
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text-muted); padding: 8px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: all .2s;
}
.pagination button:hover, .pagination button.active { background: var(--gold); color: var(--navy-dark); border-color: var(--gold); }
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Compare View */
.compare-view { display: none; }
.compare-view.active { display: block; }
.compare-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.compare-column {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
}
.compare-column h3 { text-align: center; font-size: 18px; margin-bottom: 4px; }
.compare-column .compare-subtitle { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.compare-stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.compare-stat-label { font-size: 13px; color: var(--text-muted); }
.compare-stat-value { font-size: 15px; font-weight: 600; }
.compare-shared {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-top: 24px;
}
.compare-shared h3 { text-align: center; margin-bottom: 20px; }
.alignment-meter {
  text-align: center; margin: 16px 0;
}
.alignment-meter .big-number { font-size: 56px; font-weight: 700; color: var(--gold); }
.alignment-meter .label { font-size: 14px; color: var(--text-muted); }

/* Statistics View */
.statistics-view { display: none; }
.statistics-view.active { display: block; }
.stats-section { margin-bottom: 32px; }
.stats-section h3 {
  font-size: 18px; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  color: var(--gold);
}
.stats-table {
  width: 100%; border-collapse: collapse;
}
.stats-table th {
  text-align: left; padding: 10px 16px; font-size: 12px;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dim); border-bottom: 2px solid var(--border);
}
.stats-table td {
  padding: 10px 16px; font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.stats-table tr:hover td { background: rgba(201,169,78,0.05); }
.stats-table .rank { color: var(--gold); font-weight: 700; width: 40px; }

/* Loading & Empty States */
.loading-overlay {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px; color: var(--text-muted);
}
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin .8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
.error-banner {
  background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3);
  border-radius: 8px; padding: 12px 20px; margin-bottom: 16px;
  color: #e74c3c; font-size: 14px; display: none;
}
.error-banner.visible { display: block; }

/* Responsive */
@media (max-width: 768px) {
  .header { flex-direction: column; height: auto; padding: 12px; gap: 8px; }
  .filter-bar { flex-direction: column; }
  .profile-header { flex-direction: column; align-items: center; text-align: center; }
  .profile-details { grid-template-columns: 1fr; }
  .compare-grid { grid-template-columns: 1fr; }
  .member-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .bar-label { width: 80px; font-size: 11px; }
}
@media (max-width: 480px) {
  .app-container { padding: 12px; }
  .member-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .member-card { padding: 14px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }

/* Tooltip */
.tooltip {
  position: fixed; background: var(--navy-dark); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 12px;
  pointer-events: none; z-index: 200; border: 1px solid var(--border);
  display: none;
}

/* Transitions */
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="../index.html" class="back-link">&#8592; Back</a>
    <div class="header-brand" onclick="showDirectory()">
      <div>
        <h1>MVRX</h1>
        <div class="tagline">Transparency in every vote.</div>
      </div>
    </div>
  </div>
  <nav class="header-nav">
    <button onclick="showDirectory()" class="active" id="nav-directory">Directory</button>
    <button onclick="showCompare()" id="nav-compare">Compare</button>
    <button onclick="showStatistics()" id="nav-stats">Statistics</button>
  </nav>
</header>

<div class="tooltip" id="tooltip"></div>

<div class="app-container">
  <div id="error-banner" class="error-banner"></div>

  <!-- Session Selector -->
  <div class="session-bar">
    <label>Session:</label>
    <select id="session-select" onchange="onSessionChange()"></select>
    <span id="session-info" style="font-size:13px;color:var(--text-dim)"></span>
  </div>

  <!-- ========== DIRECTORY VIEW ========== -->
  <div id="directory-view">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search by name, county, or district..." oninput="filterMembers()">
      <select id="filter-party" onchange="filterMembers()">
        <option value="">All Parties</option>
        <option value="R">Republican</option>
        <option value="D">Democrat</option>
        <option value="I">Independent</option>
      </select>
      <select id="filter-chamber" onchange="filterMembers()">
        <option value="">All Chambers</option>
        <option value="H">House</option>
        <option value="S">Senate</option>
      </select>
      <select id="filter-county" onchange="filterMembers()">
        <option value="">All Counties</option>
      </select>
    </div>
    <div class="compare-hint" id="compare-hint">
      Compare Mode: Select 2 members to compare voting records.
      <span id="compare-count">0</span>/2 selected.
      <button onclick="cancelCompare()" style="margin-left:12px;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:4px 12px;border-radius:6px;cursor:pointer;">Cancel</button>
    </div>
    <div id="member-count" style="font-size:13px;color:var(--text-dim);margin-bottom:12px;"></div>
    <div id="member-grid" class="member-grid"></div>
    <div id="member-loading" class="loading-overlay"><div class="spinner"></div>Loading members...</div>
  </div>

  <!-- ========== PROFILE VIEW ========== -->
  <div id="profile-view" class="profile-view">
    <button onclick="showDirectory()" style="background:transparent;border:none;color:var(--gold);cursor:pointer;font-size:14px;margin-bottom:16px;display:flex;align-items:center;gap:4px;">&#8592; Back to Directory</button>
    <div id="profile-content"></div>
  </div>

  <!-- ========== COMPARE VIEW ========== -->
  <div id="compare-view" class="compare-view">
    <div style="text-align:center;margin-bottom:24px;">
      <h2 style="color:var(--gold);margin-bottom:8px;">Member Comparison</h2>
      <p style="color:var(--text-muted);font-size:14px;">Select 2 members from the directory to compare their voting records side by side.</p>
      <button onclick="startCompareSelection()" style="margin-top:12px;background:var(--gold);color:var(--navy-dark);border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600;">Select Members</button>
    </div>
    <div id="compare-content"></div>
  </div>

  <!-- ========== STATISTICS VIEW ========== -->
  <div id="statistics-view" class="statistics-view">
    <h2 style="color:var(--gold);margin-bottom:24px;">Session Statistics</h2>
    <div id="stats-loading" class="loading-overlay"><div class="spinner"></div>Calculating statistics...</div>
    <div id="stats-content"></div>
  </div>
</div>

<script>
const API = 'https://rest.scstatehouse.gov';

// ===== STATE =====
let allMembers = [];
let filteredMembers = [];
let sessions = [];
let currentSession = '';
let houseVotes = [];
let senateVotes = [];
let memberVoteMap = {};
let compareMode = false;
let compareSelections = [];
let currentView = 'directory';
let votesLoaded = false;
let votesLoading = false;

// Build a quick lookup: PERM_SPONSOR_CODE -> member party
let memberPartyLookup = {};

// ===== FETCH HELPERS =====
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  // All SC Statehouse API responses are wrapped: {error, message, data}
  if (json && typeof json === 'object' && 'data' in json) {
    return json.data;
  }
  return json;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 8000);
}

// ===== INIT =====
async function init() {
  await loadSessions();
  await loadMembers();
}

async function loadSessions() {
  try {
    const data = await apiFetch(`${API}/sessions`);
    sessions = Array.isArray(data) ? data : [];
  } catch(e) {
    console.error('Failed to load sessions:', e);
    sessions = [];
  }

  // Get current session number
  try {
    const cur = await apiFetch(`${API}/currentsession`);
    // cur is an array like [{SESS_NUMBER: "126", ...}]
    if (Array.isArray(cur) && cur.length > 0 && cur[0].SESS_NUMBER) {
      currentSession = cur[0].SESS_NUMBER;
    } else if (cur && cur.SESS_NUMBER) {
      currentSession = cur.SESS_NUMBER;
    }
  } catch(e) {
    console.warn('Could not fetch current session:', e);
  }

  const sel = document.getElementById('session-select');
  sel.innerHTML = '';
  // Sessions have SESS_NUMBER, SESS_START_DATE, SESS_END_DATE
  // Sort descending by session number
  sessions.sort((a, b) => parseInt(b.SESS_NUMBER || 0) - parseInt(a.SESS_NUMBER || 0));
  sessions.forEach(s => {
    const key = s.SESS_NUMBER || '';
    const desc = `Session ${key} (${s.SESS_START_DATE || ''}${s.SESS_END_DATE ? '-' + s.SESS_END_DATE : ''})`;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = desc;
    sel.appendChild(opt);
  });
  if (currentSession) sel.value = currentSession;
  else if (sessions.length > 0) currentSession = sessions[0].SESS_NUMBER;
  if (!currentSession) currentSession = sel.value;

  document.getElementById('session-info').textContent = currentSession ? `Current session: ${currentSession}` : '';
}

  houseVotes = [];
  senateVotes = [];
  document.getElementById('session-info').textContent = `Current session: ${currentSession}`;
  if (currentView === 'profile') {
    // re-render current profile if we have one stored

async function loadMembers() {
  const grid = document.getElementById('member-grid');
  const loading = document.getElementById('member-loading');
  loading.style.display = 'flex';
  grid.innerHTML = '';

  let house = [], senate = [];
  try {
    const results = await Promise.all([
      apiFetch(`${API}/house/bios`).catch(e => { console.error('House bios error:', e); return []; }),
      apiFetch(`${API}/senate/bios`).catch(e => { console.error('Senate bios error:', e); return []; })
    ]);
    house = results[0];
    senate = results[1];
  } catch(e) {
    console.error('Members load error:', e);
  }

  house = Array.isArray(house) ? house : [];
  senate = Array.isArray(senate) ? senate : [];
  house.forEach(m => m.CHAMBER = m.CHAMBER || 'H');
  senate.forEach(m => m.CHAMBER = m.CHAMBER || 'S');

  allMembers = [...house, ...senate];
  if (allMembers.length === 0) {
    showError('Failed to load members from the SC Statehouse API. Please try refreshing the page.');
  }

  // Build party lookup for fast access during vote processing
  memberPartyLookup = {};
  allMembers.forEach(m => {
    if (m.PERM_SPONSOR_CODE) memberPartyLookup[m.PERM_SPONSOR_CODE] = m.PARTY;
  });

  // Populate county filter
  const counties = [...new Set(allMembers.map(m => m.HOME_COUNTY).filter(Boolean))].sort();
  const countySelect = document.getElementById('filter-county');
  countySelect.innerHTML = '<option value="">All Counties</option>';
  counties.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    countySelect.appendChild(o);
  });

  loading.style.display = 'none';
  filterMembers();
}

// ===== VOTES =====
async function loadVotes() {
  if (votesLoaded || votesLoading) return;
  votesLoading = true;
  try {
    const session = currentSession;
    const results = await Promise.all([
      apiFetch(`${API}/vote/${session}/house`).catch(e => { console.error('House votes error:', e); return []; }),
      apiFetch(`${API}/vote/${session}/senate`).catch(e => { console.error('Senate votes error:', e); return []; })
    ]);
    houseVotes = Array.isArray(results[0]) ? results[0] : [];
    senateVotes = Array.isArray(results[1]) ? results[1] : [];
    buildMemberVoteMap();
    votesLoaded = true;
  } catch(e) {
    console.error('Votes load error:', e);
    houseVotes = [];
    senateVotes = [];
  }
  votesLoading = false;
}

// Translate HOWVOTED code to a choice label
function howVotedToChoice(howvoted) {
  if (!howvoted) return 'Absent';
  const h = howvoted.toUpperCase();
  if (h === 'Y') return 'Yea';
  if (h === 'N') return 'Nay';
  if (h === 'A' || h === 'E') return 'Excused';
  return 'Absent'; // N/V, or anything else
}

function buildMemberVoteMap() {
  memberVoteMap = {};
  const allVotes = [...houseVotes, ...senateVotes];

  // CHOICES is an ARRAY of choice objects, each with SPONSORS array
  // Each choice: {KEY, VOTEKEY, RESULT, YEAS, NAYS, RESULTTEXT, STATS, SPONSORS: [{PERM_SPONSOR_CODE, HOWVOTED, FULL_NAME, CHAMBER_NAME}]}
  allVotes.forEach(vote => {
    if (!vote.CHOICES || !Array.isArray(vote.CHOICES)) return;

    vote.CHOICES.forEach(choice => {
      if (!choice.SPONSORS || !Array.isArray(choice.SPONSORS)) return;

      choice.SPONSORS.forEach(sponsor => {
        const code = sponsor.PERM_SPONSOR_CODE;
        if (!code) return;

        const memberChoice = howVotedToChoice(sponsor.HOWVOTED);

        if (!memberVoteMap[code]) memberVoteMap[code] = [];
        memberVoteMap[code].push({
          voteKey: vote.KEY,
          chamber: vote.CHAMBER,
          voteNumber: vote.VOTE_NUMBER,
          billNumber: vote.BILL_NUMBER,
          motion: vote.MOTION,
          time: vote.VOTETIME,
          approved: vote.APPROVED,
          resultText: choice.RESULTTEXT || '',
          choice: memberChoice,
          howVoted: sponsor.HOWVOTED
        });
      });
    });
  });
}

// ===== FILTER & RENDER MEMBERS =====
function filterMembers() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const party = document.getElementById('filter-party').value;
  const chamber = document.getElementById('filter-chamber').value;
  const county = document.getElementById('filter-county').value;

  filteredMembers = allMembers.filter(m => {
    if (party && m.PARTY !== party) return false;
    if (chamber && m.CHAMBER !== chamber) return false;
    if (county && m.HOME_COUNTY !== county) return false;
    if (search) {
      const hay = `${m.FIRST} ${m.LAST} ${m.HOME_COUNTY} ${m.DISTRICT_NUMBER} ${m.OCCUPATION || ''}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  filteredMembers.sort((a, b) => (a.LAST || '').localeCompare(b.LAST || ''));
  document.getElementById('member-count').textContent = `Showing ${filteredMembers.length} of ${allMembers.length} members`;
  renderMemberGrid();
}

function renderMemberGrid() {
  const grid = document.getElementById('member-grid');
  if (filteredMembers.length === 0) {
    grid.innerHTML = '<div class="empty-state">No members match your filters.</div>';
    return;
  }
  grid.innerHTML = filteredMembers.map(m => {
    const code = m.PERM_SPONSOR_CODE || '';
    const initials = (m.FIRST?.[0]||'') + (m.LAST?.[0]||'');
    const partyClass = (m.PARTY||'').toLowerCase();
    const chamberLabel = m.CHAMBER === 'S' ? 'Senate' : 'House';
    const isSelected = compareSelections.includes(code);
    return `
      <div class="member-card fade-in ${isSelected ? 'selected-compare' : ''}"
           onclick="${compareMode ? `toggleCompareSelect('${code}')` : `showProfile('${code}')`}"
           data-code="${code}">
        <div class="party-stripe party-${partyClass}"></div>
        <div class="member-avatar">${initials}</div>
        <h3>${m.TITLE || ''} ${m.FIRST} ${m.LAST}</h3>
        <div class="member-meta">
          <span>${chamberLabel}</span> &middot; <span>District ${m.DISTRICT_NUMBER || '?'}</span>
        </div>
        <div class="member-meta" style="margin-top:2px;">${m.HOME_COUNTY || ''}</div>
        <span class="party-badge badge-${partyClass}">${m.PARTY || '?'}</span>
      </div>`;
  }).join('');
}

function switchTab(btn, tabId) {
  btn.closest('.profile-view, #profile-content').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.profile-view, #profile-content').querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(tabId);
  if (panel) panel.classList.add('active');
}

function calcPartyAlignment(member, votes) {
  if (votes.length === 0) return 0;
  const party = member.PARTY;
  const allVotesList = [...houseVotes, ...senateVotes];
  let aligned = 0, counted = 0;

  votes.forEach(v => {
    if (v.choice !== 'Yea' && v.choice !== 'Nay') return;
    const fullVote = allVotesList.find(fv => fv.KEY === v.voteKey);
    if (!fullVote || !fullVote.CHOICES || !Array.isArray(fullVote.CHOICES)) return;

    // Count how same-party members voted on this vote
    let partyYeas = 0, partyNays = 0;
    fullVote.CHOICES.forEach(choice => {
      if (!choice.SPONSORS || !Array.isArray(choice.SPONSORS)) return;
      choice.SPONSORS.forEach(sponsor => {
        const sponsorParty = memberPartyLookup[sponsor.PERM_SPONSOR_CODE];
        if (sponsorParty !== party) return;
        const sv = howVotedToChoice(sponsor.HOWVOTED);
        if (sv === 'Yea') partyYeas++;
        else if (sv === 'Nay') partyNays++;
      });
    });

    if (partyYeas + partyNays < 2) return;
    const partyMajority = partyYeas >= partyNays ? 'Yea' : 'Nay';
    if (v.choice === partyMajority) aligned++;
    counted++;
  });

  return counted > 0 ? Math.round((aligned / counted) * 100) : 0;
}

// ===== HEATMAP =====
function renderHeatmap(votes) {
  if (votes.length === 0) return '<div class="empty-state">No vote data available for heatmap.</div>';

  // Count votes per date from VOTETIME (format: "2026-03-10 20:54:00")
  const dateCounts = {};
  votes.forEach(v => {
    if (!v.time) return;
    const d = v.time.split(' ')[0].split('T')[0];
    if (d && d.includes('-')) {
      const normalized = normalizeDate(d);
      if (normalized) dateCounts[normalized] = (dateCounts[normalized] || 0) + 1;
    }
  });

  const dates = Object.keys(dateCounts).sort();
  if (dates.length === 0) return '<div class="empty-state">No date information available for heatmap.</div>';

  // Find date range
  const first = new Date(dates[0]);
  const last = new Date(dates[dates.length - 1]);
  const startDate = new Date(first);
  startDate.setDate(startDate.getDate() - startDate.getDay()); // Start on Sunday

  const maxCount = Math.max(...Object.values(dateCounts));

  const weeksTotal = Math.ceil(((last - startDate) / 86400000 + 1) / 7) + 1;

  let cells = '';
  const current = new Date(startDate);
  for (let w = 0; w < weeksTotal; w++) {
    for (let d = 0; d < 7; d++) {
      const ds = current.toISOString().split('T')[0];
      const count = dateCounts[ds] || 0;
      let level = 0;
      if (count > 0) level = count <= maxCount*0.25 ? 1 : count <= maxCount*0.5 ? 2 : count <= maxCount*0.75 ? 3 : 4;
      cells += `<div class="heatmap-cell level-${level}" title="${ds}: ${count} votes"></div>`;
      current.setDate(current.getDate() + 1);
    }
  }

  return `
    <h4 style="color:var(--gold);margin-bottom:12px;">Voting Activity</h4>
    <div class="heatmap-container">
      <div class="heatmap-grid">${cells}</div>
    </div>
    <div class="heatmap-legend">
      <span>Less</span>
      <div class="heatmap-cell level-0"></div>
      <div class="heatmap-cell level-1"></div>
      <div class="heatmap-cell level-2"></div>
      <div class="heatmap-cell level-3"></div>
      <div class="heatmap-cell level-4"></div>
      <span>More</span>
      <span style="margin-left:16px;">Total days voted: ${dates.length}</span>
    </div>
  `;
}

function normalizeDate(d) {
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return null;
    return dt.toISOString().split('T')[0];
  } catch(e) { return null; }
}

// ===== VOTE HISTORY =====
const VOTES_PER_PAGE = 20;

function renderVoteHistory(votes, page) {
  if (votes.length === 0) return '<div class="empty-state">No vote history for this session.</div>';

  const sorted = [...votes].sort((a,b) => {
    if (a.time && b.time) return b.time.localeCompare(a.time);
    return (parseInt(b.voteNumber) || 0) - (parseInt(a.voteNumber) || 0);
  });

  const totalPages = Math.ceil(sorted.length / VOTES_PER_PAGE);
  const start = (page - 1) * VOTES_PER_PAGE;
  const pageVotes = sorted.slice(start, start + VOTES_PER_PAGE);

  let html = '<div class="vote-list">';
  pageVotes.forEach(v => {
    const choiceClass = v.choice === 'Yea' ? 'vote-yea' : v.choice === 'Nay' ? 'vote-nay' : v.choice === 'Excused' ? 'vote-excused' : 'vote-absent';
    const isApproved = v.approved === '1' || v.approved === 1 || v.approved === 'Y' || v.approved === true;
    const isRejected = v.approved === '0' || v.approved === 0 || v.approved === 'N' || v.approved === false;
    const approvedClass = isApproved ? 'yes' : 'no';
    const approvedText = v.resultText || (isApproved ? 'Approved' : isRejected ? 'Rejected' : '');
    const billLabel = v.billNumber ? `Bill ${v.billNumber}` : `Vote #${v.voteNumber || '?'}`;
    html += `
      <div class="vote-item">
        <div class="vote-result ${choiceClass}">${v.choice || '?'}</div>
        <div class="vote-details">
          <h4>${billLabel}</h4>
          <div class="vote-motion">${v.motion || 'No motion text available'}</div>
          <div class="vote-time">${v.time || ''}</div>
          ${approvedText ? `<div class="vote-approved ${approvedClass}">${approvedText}</div>` : ''}
        </div>
      </div>`;
  });
  html += '</div>';

  if (totalPages > 1) {
    html += '<div class="pagination">';
    html += `<button onclick="changeVotePage(${page-1})" ${page<=1?'disabled':''}>&#8592; Prev</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && Math.abs(i - page) > 2 && i !== 1 && i !== totalPages) {
        if (i === 2 || i === totalPages - 1) html += '<button disabled>...</button>';
        continue;
      }
      html += `<button class="${i===page?'active':''}" onclick="changeVotePage(${i})">${i}</button>`;
    }
    html += `<button onclick="changeVotePage(${page+1})" ${page>=totalPages?'disabled':''}>Next &#8594;</button>`;
    html += '</div>';
  }

  return html;
}

function changeVotePage(page) {
  window._profilePage = page;
  document.getElementById('vote-history-list').innerHTML = renderVoteHistory(window._profileVotes, page);
}

// ===== COMPARE =====
function startCompareSelection() {
  compareMode = true;
  compareSelections = [];
  showDirectory();
  document.getElementById('compare-hint').classList.add('active');
  document.getElementById('compare-count').textContent = '0';
  renderMemberGrid();
}

function cancelCompare() {
  compareMode = false;
  compareSelections = [];
  document.getElementById('compare-hint').classList.remove('active');
  renderMemberGrid();
}

function toggleCompareSelect(code) {
  const idx = compareSelections.indexOf(code);
  if (idx >= 0) {
    compareSelections.splice(idx, 1);
  } else if (compareSelections.length < 2) {
    compareSelections.push(code);
  }
  document.getElementById('compare-count').textContent = compareSelections.length;
  renderMemberGrid();

  if (compareSelections.length === 2) {
    compareMode = false;
    document.getElementById('compare-hint').classList.remove('active');
    doCompare(compareSelections[0], compareSelections[1]);
  }
}

async function doCompare(code1, code2) {
  showCompare();
  const container = document.getElementById('compare-content');
  container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>Loading comparison...</div>';

  await loadVotes();

  const m1 = allMembers.find(m => m.PERM_SPONSOR_CODE === code1);
  const m2 = allMembers.find(m => m.PERM_SPONSOR_CODE === code2);
  if (!m1 || !m2) { container.innerHTML = '<div class="empty-state">Members not found.</div>'; return; }

  const v1 = memberVoteMap[code1] || [];
  const v2 = memberVoteMap[code2] || [];

  const stats1 = calcMemberStats(v1, m1);
  const stats2 = calcMemberStats(v2, m2);

  // Voting alignment between two members - match by vote KEY
  const alignment = calcMutualAlignment(v1, v2);

  const renderCol = (m, s) => {
    const initials = (m.FIRST?.[0]||'') + (m.LAST?.[0]||'');
    const pClass = (m.PARTY||'').toLowerCase();
    const chamberLabel = m.CHAMBER === 'S' ? 'Senate' : 'House';
    return `
      <div class="compare-column fade-in">
        <div style="text-align:center;margin-bottom:12px;">
          <div class="member-avatar" style="margin:0 auto 8px;width:64px;height:64px;font-size:22px;">${initials}</div>
        </div>
        <h3>${m.TITLE || ''} ${m.FIRST} ${m.LAST}</h3>
        <div class="compare-subtitle"><span class="party-badge badge-${pClass}">${m.PARTY}</span> ${chamberLabel} - District ${m.DISTRICT_NUMBER || '?'}</div>
        <div class="compare-stat-row"><span class="compare-stat-label">Total Votes</span><span class="compare-stat-value">${s.total}</span></div>
        <div class="compare-stat-row"><span class="compare-stat-label">Yea</span><span class="compare-stat-value" style="color:var(--success)">${s.yeas} (${s.yeaPct}%)</span></div>
        <div class="compare-stat-row"><span class="compare-stat-label">Nay</span><span class="compare-stat-value" style="color:var(--danger)">${s.nays} (${s.nayPct}%)</span></div>
        <div class="compare-stat-row"><span class="compare-stat-label">Absent/Excused</span><span class="compare-stat-value">${s.absent}</span></div>
        <div class="compare-stat-row"><span class="compare-stat-label">Party Alignment</span><span class="compare-stat-value" style="color:var(--gold)">${s.partyAlignment}%</span></div>
        <div class="compare-stat-row"><span class="compare-stat-label">Participation Rate</span><span class="compare-stat-value">${s.participationPct}%</span></div>
      </div>`;
  };

  container.innerHTML = `
    <div class="compare-grid">
      ${renderCol(m1, stats1)}
      ${renderCol(m2, stats2)}
    </div>
    <div class="compare-shared fade-in">
      <h3>Voting Alignment</h3>
      <div class="alignment-meter">
        <div class="big-number">${alignment}%</div>
        <div class="label">of the time these members voted the same way</div>
      </div>
      <div class="bar-chart" style="max-width:500px;margin:20px auto;">
        <div class="bar-row">
          <div class="bar-label">Agreement</div>
          <div class="bar-track"><div class="bar-fill" style="width:${alignment}%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));">${alignment}%</div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Disagreement</div>
          <div class="bar-track"><div class="bar-fill" style="width:${100-alignment}%;background:linear-gradient(90deg,#5a6a80,#8a9bb5);">${100-alignment}%</div></div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:20px;">
      <button onclick="startCompareSelection()" style="background:var(--gold);color:var(--navy-dark);border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600;">Compare Different Members</button>
    </div>
  `;
}

function calcMemberStats(votes, member) {
  const yeas = votes.filter(v => v.choice === 'Yea').length;
  const nays = votes.filter(v => v.choice === 'Nay').length;
  const absent = votes.filter(v => v.choice !== 'Yea' && v.choice !== 'Nay').length;
  const total = votes.length;
  const participated = yeas + nays;
  return {
    total, yeas, nays, absent,
    yeaPct: total ? Math.round(yeas/total*100) : 0,
    nayPct: total ? Math.round(nays/total*100) : 0,
    participationPct: total ? Math.round(participated/total*100) : 0,
    partyAlignment: calcPartyAlignment(member, votes)
  };
}

function calcMutualAlignment(v1, v2) {
  // Match votes by vote KEY (unique identifier for each vote)
  const map1 = {};
  v1.forEach(v => {
    if (v.choice === 'Yea' || v.choice === 'Nay') map1[v.voteKey] = v.choice;
  });

  let same = 0, total = 0;
  v2.forEach(v => {
    if ((v.choice === 'Yea' || v.choice === 'Nay') && map1[v.voteKey]) {
      total++;
      if (map1[v.voteKey] === v.choice) same++;
    }
  });

  return total > 0 ? Math.round(same/total*100) : 0;
}

// ===== STATISTICS =====
async function renderStatistics() {
  const loading = document.getElementById('stats-loading');
  const container = document.getElementById('stats-content');
  loading.style.display = 'flex';
  container.innerHTML = '';

  await loadVotes();
  loading.style.display = 'none';

  // Compute per-member stats
  const memberStats = allMembers.map(m => {
    const code = m.PERM_SPONSOR_CODE;
    const votes = memberVoteMap[code] || [];
    const yeas = votes.filter(v => v.choice === 'Yea').length;
    const nays = votes.filter(v => v.choice === 'Nay').length;
    const absent = votes.filter(v => v.choice !== 'Yea' && v.choice !== 'Nay').length;
    const total = votes.length;
    const participated = yeas + nays;
    return {
      member: m, code, total, yeas, nays, absent, participated,
      participationRate: total > 0 ? (participated/total*100) : 0,
      partyAlignment: calcPartyAlignment(m, votes)
    };
  }).filter(s => s.total > 0);

  if (memberStats.length === 0) {
    container.innerHTML = '<div class="empty-state">No voting data available for this session to generate statistics.</div>';
    return;
  }

  // Most active
  const byTotal = [...memberStats].sort((a,b) => b.total - a.total).slice(0, 15);
  // Highest party alignment
  const byAlignment = [...memberStats].filter(s => s.total >= 10).sort((a,b) => b.partyAlignment - a.partyAlignment).slice(0, 15);
  // Cross-party (lowest alignment)
  const byCross = [...memberStats].filter(s => s.total >= 10).sort((a,b) => a.partyAlignment - b.partyAlignment).slice(0, 15);
  // Best participation
  const byParticipation = [...memberStats].filter(s => s.total >= 10).sort((a,b) => b.participationRate - a.participationRate).slice(0, 15);

  const renderTable = (data, valueLabel, valueFn) => {
    return `<table class="stats-table">
      <thead><tr><th>#</th><th>Member</th><th>Party</th><th>Chamber</th><th>${valueLabel}</th></tr></thead>
      <tbody>${data.map((s, i) => {
        const m = s.member;
        const chamberLabel = m.CHAMBER === 'S' ? 'Senate' : 'House';
        return `<tr style="cursor:pointer" onclick="showProfile('${s.code}')">
          <td class="rank">${i+1}</td>
          <td>${m.FIRST} ${m.LAST}</td>
          <td><span class="party-badge badge-${(m.PARTY||'').toLowerCase()}">${m.PARTY}</span></td>
          <td>${chamberLabel}</td>
          <td style="font-weight:600">${valueFn(s)}</td>
        </tr>`;
      }).join('')}</tbody></table>`;
  };

  // Summary stats
  const totalVotesCast = memberStats.reduce((s,m) => s + m.total, 0);
  const avgParticipation = Math.round(memberStats.reduce((s,m) => s + m.participationRate, 0) / memberStats.length);
  const avgAlignment = Math.round(memberStats.reduce((s,m) => s + m.partyAlignment, 0) / memberStats.length);
  const allVotesCount = houseVotes.length + senateVotes.length;

  container.innerHTML = `
    <div class="stats-row fade-in">
      <div class="stat-card"><div class="stat-value">${allMembers.length}</div><div class="stat-label">Total Members</div></div>
      <div class="stat-card"><div class="stat-value">${allVotesCount}</div><div class="stat-label">Recorded Votes</div></div>
      <div class="stat-card"><div class="stat-value">${totalVotesCast.toLocaleString()}</div><div class="stat-label">Individual Votes Cast</div></div>
      <div class="stat-card"><div class="stat-value">${avgParticipation}%</div><div class="stat-label">Avg Participation</div></div>
      <div class="stat-card"><div class="stat-value">${avgAlignment}%</div><div class="stat-label">Avg Party Alignment</div></div>
    </div>

    <div class="stats-section fade-in">
      <h3>Most Active Voters</h3>
      ${renderTable(byTotal, 'Total Votes', s => s.total)}
    </div>

    <div class="stats-section fade-in">
      <h3>Highest Participation Rate</h3>
      ${renderTable(byParticipation, 'Rate', s => s.participationRate.toFixed(1) + '%')}
    </div>

    <div class="stats-section fade-in">
      <h3>Highest Party Alignment</h3>
      ${renderTable(byAlignment, 'Alignment', s => s.partyAlignment + '%')}
    </div>

    <div class="stats-section fade-in">
      <h3>Cross-Party Voters (Lowest Party Alignment)</h3>
      ${renderTable(byCross, 'Alignment', s => s.partyAlignment + '%')}
    </div>
  `;
}

// ===== TOOLTIP =====
document.addEventListener('mouseover', e => {
  if (e.target.classList.contains('heatmap-cell') && e.target.title) {
    const tip = document.getElementById('tooltip');
    tip.textContent = e.target.title;
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 30) + 'px';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.classList.contains('heatmap-cell')) {
    document.getElementById('tooltip').style.display = 'none';
  }
});
document.addEventListener('mousemove', e => {
  const tip = document.getElementById('tooltip');
  if (tip.style.display === 'block') {
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 30) + 'px';
  }
});

// ===== START =====
init();
</script>
</body>
</html>
